# 科研团队评分卡配置(增强版:含 HITL + 失败模式归档)
# 依据:NeurIPS/ICLR/ACL 审稿 rubric + Si et al. 2024 (arXiv:2409.04109) idea 六维评估
# 合格线 75 分,任一维度 < 50% 触发一票否决直接返工
# 灰色地带维度(novelty/significance)的最终判断走 human_escalation,不纯靠评分

scoring:
  total_max: 100
  pass_threshold: 75
  veto_threshold_percent: 50  # 任一维度低于此百分比触发一票否决

  dimensions:
    - id: soundness
      name: 严谨性
      weight: 25
      description: 方法正确、推理无漏洞、实验充分、统计显著、引用真实
      tool_checks:
        - citation_verification    # 引用真实性核查(工具)
        - reproducibility_check     # 可复现性核查
        - statistical_significance  # 统计显著性
      veto_eligible: true
      gray_zone: false             # 严谨性可量化,不走 HITL

    - id: novelty
      name: 新颖性
      weight: 20
      description: 与已有工作的区别,是否撞车近 2 年文献
      tool_checks:
        - literature_comparison   # 与近 2 年相关工作比对
      veto_eligible: true
      gray_zone: true              # 撞车边界模糊,走 HITL

    - id: clarity
      name: 清晰度
      weight: 20
      description: 表达清楚、结构合理、图表规范
      tool_checks:
        - grammar_check            # 语法检查
        - format_check             # 格式规范
      veto_eligible: false
      gray_zone: false

    - id: feasibility
      name: 可行性
      weight: 15
      description: 资源/时间/数据可得性,能否在约束内完成
      tool_checks:
        - resource_assessment      # 资源评估
      veto_eligible: true
      gray_zone: false

    - id: significance
      name: 影响力
      weight: 10
      description: 问题是否值得做,结论是否有用
      tool_checks: []
      veto_eligible: false
      gray_zone: true              # 问题价值判断主观,走 HITL

    - id: confidence
      name: 置信度
      weight: 10
      description: 评分者对本次评分的自评置信度,用于加权或多人投票
      tool_checks: []
      veto_eligible: false
      gray_zone: false             # 置信度本身是 HITL 的触发条件,不是被触发维度

# 返工循环配置(Reflexion 式)
rework:
  max_rounds: 3                  # 同一产出最多返工 3 次(兜底硬上限)
  reflection_required: true      # 返工前必须先生成反思文本
  reflection_storage: checkpointer  # 反思存入 checkpointer(单会话)
  escalation_after: 2            # 同一维度连续返工 >=2 次升级为跨会话经验
  hard_escalation: true          # 超 3 轮上报用户决策(兜底,与 human_escalation 互补)

# 人类介入决策(HITL)— 灰色地带组合触发
# 与返工流程并行:命中任一 H 条件即暂停流水线生成决策包,不消耗返工次数
# 详见 docs/research-scoring-and-reflection.md 第三节
human_escalation:
  enabled: true
  pause_on_trigger: true         # 命中即挂起当前角色(不取消)
  decision_package_required: true # 必须生成决策包(争议点/两方观点/可选方案/建议)才能请人裁决

  triggers:
    - id: H1
      name: 灰色区间得分
      condition: "novelty 或 significance 得分 ∈ [50, 65)"
      threshold:
        gray_zone_low: 50        # 灰色区间下界(等于 veto_threshold_percent)
        gray_zone_high: 65       # 灰色区间上界(低于 pass_threshold 的 65% 等价)
      action: pause_and_escalate

    - id: H2
      name: 低置信度
      condition: "confidence 维度得分 < 60"
      threshold: 60
      action: pause_and_escalate

    - id: H3
      name: persona 分歧
      condition: "多 persona 评审(严格派/宽松派/领域专家派)总体判断相差 ≥ 2 档"
      threshold: 2               # 档差
      action: pause_and_escalate

    - id: H4
      name: claim 边界
      condition: "claim 强度与证据强度差一档且无法自动校准"
      threshold: 1               # 档差
      action: pause_and_escalate

    - id: H5
      name: 方向性决策
      condition: "PI 提出换方向/放弃假设/调整核心创新点"
      threshold: null            # 事件型触发,无数值阈值
      action: pause_and_escalate

    - id: H6
      name: 重复返工预警
      condition: "同一维度连续返工 = 2 次(提前介入避免第 3 次无效循环)"
      threshold: 2               # 等于 rework.escalation_after
      action: pause_and_escalate

  # 自动授权(命中条件且满足预设规则时不暂停,只记录,事后可追溯)
  # 用户可按需增删,留空表示全部都暂停
  auto_authorize:
    - condition: "H1 命中且 novelty ≥ 55"
      auto_action: "弱化 claim 到中证据强度"
      record_only: true
    # 示例(默认注释,按需启用):
    # - condition: "H2 命中且非 novelty 维度"
    #   auto_action: "按评分卡默认处理"
    #   record_only: true

  # 裁决内化
  ruling_internalization:
    one_off_target: checkpointer           # 一次性裁决存项目记忆
    general_target: SOUL.md                # 通用规则写 SOUL.md(标日期+来源)
    marker_format: "[人工裁决 YYYY-MM-DD] 规则内容"

# 跨项目经验积累(ExpeL 式)
experience:
  storage: skills/experience/    # 经验库目录
  extraction_trigger: project_end  # 项目结束时触发经验抽取
  dedup_enabled: true            # 经验去重(语义相似度 > 0.85 视为重复)
  decay_enabled: true            # 经验衰减(长期不用的降低权重)
  retrieval_top_k: 5             # 新项目启动时检索 top-k 经验注入 prompt

# 失败模式归档(负面结果价值捕获)  ← 新增
# 与 experience(anti-pattern) 区别:失败发生时即时归档,粒度为"方法边界"而非"行为教训"
# 详见 docs/research-scoring-and-reflection.md 第四节场景 4
failure_mode:
  enabled: true
  storage: skills/experience/<agent_id>/failure-modes/  # 失败模式库目录
  trigger: on_failure           # 实验/假设失败时即时触发(不等项目结束)
  triggering_roles:             # 有权调用 failure-mode-archiving 的角色
    - office-research-pi
    - office-research-engineer
    - office-data-analyst
  record_fields:                # 每条失败模式记录必填字段
    - hypothesis_or_method      # 假设/方法是什么(原预期)
    - expected_result           # 预期结果
    - actual_result             # 实际结果
    - failure_condition         # 失效条件(什么条件下不工作)
    - possible_cause            # 可能原因(标注"推测",不冒充定论)
    - method_boundary           # 方法边界(此方法在 X 范围内不适用)
    - systemic_flag             # 偶发失败 vs 系统性失败
    - source_project_id         # 来源项目 id
  notify_pi: true               # 归档后通知 PI 评估是否调整方向(若调整触发 H5)
  retrieval:                    # 新实验设计前检索相关失败模式
    enabled: true
    top_k: 5
    retrieve_before: experiment_design  # 在实验设计阶段检索
  dedup_enabled: true           # 失败模式去重(相同方法+相同失效条件视为重复)
  decay_enabled: true           # 方法迭代后旧失效条件可能不再成立,需定期复核
  human_review_before_persist: false  # 失败模式即时归档,不强制人工 review(与 anti-pattern 不同,失败细节越早记越准)

# 用户纠正内化
preference_internalization:
  target: SOUL.md                # 通用偏好写入 SOUL.md
  one_off_target: checkpointer   # 一次性指正存 checkpointer
  marker_format: "[用户偏好 YYYY-MM-DD] 规则内容"

# 多评审员辩论(可选,进阶)
multi_reviewer:
  enabled: false                 # 默认关闭,进阶启用
  reviewer_count: 3              # 3 个 reviewer 实例
  personas: [strict, lenient, methodological_critic]
  convergence_rounds: 2          # 辩论收敛轮数
  divergence_triggers_hitl: true # persona 分歧超阈值时触发 H3
