name: Production Gates

on:
  push:
    branches:
      - main
      - research-team
      - writer-team
  pull_request:

permissions:
  contents: read

concurrency:
  group: production-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Detect source Web UI
        id: web-ui
        shell: bash
        run: |
          if [[ -f web-ui/package-lock.json ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Node.js
        if: steps.web-ui.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-ui/package-lock.json
      - name: Build user and admin applications
        if: steps.web-ui.outputs.enabled == 'true'
        working-directory: web-ui
        run: |
          npm ci
          npm run typecheck
          npm run build
      - name: Validate scripts
        run: |
          bash -n install.sh update agent-system/bin/feishu-team-bootstrap agent-system/tests/smoke.sh agent-system/tests/web-pwa-smoke.sh
          node --check agent-system/bin/feishu-team-bootstrap.mjs
          python3 -m py_compile agent-system/bin/office-system.py agent-system/bin/harness-runner agent-system/bin/harness-check agent-system/bin/feishu-team-gateway.py
      - name: Check harness definitions
        run: agent-system/bin/harness-check
      - name: Run production gates
        run: agent-system/bin/harness-runner --task all --no-write

  clean-install-smoke:
    needs: harness
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Detect source Web UI
        id: web-ui
        shell: bash
        run: |
          if [[ -f web-ui/package-lock.json ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Node.js
        if: steps.web-ui.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-ui/package-lock.json
      - name: Build user and admin applications
        if: steps.web-ui.outputs.enabled == 'true'
        working-directory: web-ui
        run: |
          npm ci
          npm run build
      - name: Run clean-install smoke test
        run: agent-system/tests/smoke.sh
